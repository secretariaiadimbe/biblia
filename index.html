<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plano de Leitura de Salmos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #fff7ed, #fed7aa);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #c2410c;
      margin-bottom: 5px;
    }

    h2 {
      text-align: center;
      color: #666;
      font-weight: normal;
      margin-top: 0;
      margin-bottom: 30px;
    }

    .progress-container {
      margin-bottom: 30px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 24px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #f97316;
      transition: width 0.3s;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      color: #444;
    }

    .day-card {
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: 0.2s;
      background: white;
    }

    .day-card:hover {
      border-color: #fb923c;
    }

    .day-card.completed {
      background: #dcfce7;
      border-color: #16a34a;
    }

    .check {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .completed .check {
      background: #16a34a;
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Plano de Leitura Bíblica</h1>
  <h2>Livro de Salmos em 30 Dias</h2>

  <div class="progress-container">
    <div class="progress-text">
      <span>Progresso</span>
      <span id="progressText">0% concluído</span>
    </div>

    <div class="progress-bar-bg">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div id="lista"></div>

  <div class="footer">
    Seu progresso é salvo automaticamente neste dispositivo.
  </div>
</div>

<script>
  const plano = [
    '1–5','6–9','10–14','15–18','19–22','23–27','28–31','32–35',
    '36–39','40–44','45–49','50–54','55–59','60–64','65–69',
    '70–74','75–79','80–84','85–89','90–94','95–99','100–104',
    '105–109','110–114','115–118','119','120–124','125–129',
    '130–139','140–150'
  ];

  let concluidos = JSON.parse(localStorage.getItem('salmos30')) || [];

  const lista = document.getElementById('lista');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');

  function salvar() {
    localStorage.setItem('salmos30', JSON.stringify(concluidos));
  }

  function atualizarProgresso() {
    const porcentagem = Math.round((concluidos.length / plano.length) * 100);
    progressBar.style.width = porcentagem + '%';
    progressText.innerText = porcentagem + '% concluído';
  }

  function renderizar() {
    lista.innerHTML = '';

    plano.forEach((salmos, index) => {
      const dia = index + 1;
      const concluido = concluidos.includes(dia);

      const card = document.createElement('div');
      card.className = 'day-card' + (concluido ? ' completed' : '');

      card.innerHTML = `
        <div>
          <strong>Dia ${dia}</strong><br>
          <span>Salmos ${salmos}</span>
        </div>

        <div class="check">
          ${concluido ? '✓' : ''}
        </div>
      `;

      card.addEventListener('click', () => {
        if (concluidos.includes(dia)) {
          concluidos = concluidos.filter(d => d !== dia);
        } else {
          concluidos.push(dia);
        }

        salvar();
        renderizar();
        atualizarProgresso();
      });

      lista.appendChild(card);
    });
  }

  renderizar();
  atualizarProgresso();
</script>

</body>
</html>
